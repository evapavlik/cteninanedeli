name: Deploy Edge Functions

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref uedluysdwvcdrhjiotjc
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Set secrets
        run: |
          supabase secrets set \
            GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
            FIRECRAWL_API_KEY="${{ secrets.FIRECRAWL_API_KEY }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy functions
        run: |
          supabase functions deploy annotate-reading --no-verify-jwt
          supabase functions deploy warm-cache --no-verify-jwt
          supabase functions deploy import-corpus --no-verify-jwt
          supabase functions deploy import-postily --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
