name: Deploy Edge Functions

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref uedluysdwvcdrhjiotjc
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Set secrets
        run: |
          # Nastaví jen ty secrets, které jsou definované v GitHub repo secrets.
          # Prázdná hodnota = secret v GitHub není nastavený → nepřepisuj Supabase.
          [ -n "$GEMINI_API_KEY" ]    && supabase secrets set GEMINI_API_KEY="$GEMINI_API_KEY"
          [ -n "$FIRECRAWL_API_KEY" ] && supabase secrets set FIRECRAWL_API_KEY="$FIRECRAWL_API_KEY"
          true  # krok nesmí selhat pokud žádný secret nebyl nastaven
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}

      - name: Deploy functions
        run: |
          supabase functions deploy annotate-reading --no-verify-jwt
          supabase functions deploy warm-cache --no-verify-jwt
          supabase functions deploy import-corpus --no-verify-jwt
          supabase functions deploy import-postily --no-verify-jwt
          supabase functions deploy import-czech-zapas --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
